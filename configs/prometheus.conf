[system]
hostname = "prometheus"
kernel = "linux-zen"
boot_animation = true
ai_voice_init = true
auto_rollback = true
health_check = true

[desktop]
compositor = "prometheus-compositor"
default_session = "prometheus"
wallpaper = "/usr/share/prometheus/wallpapers/default.png"
theme = "prometheus-dark"
icon_theme = "prometheus-icons"
font = "Inter"
font_size = 10
cursor_theme = "prometheus-cursor"
cursor_size = 24

[ai]
enabled = true
startup_delay = 0
wake_word = "prometheus"
language = "en-US"
learning_enabled = true
memory_enabled = true
vision_enabled = true
voice_enabled = true
automation_enabled = true
context_window = 4096
max_agents = 8
resource_scale = true
idle_timeout = 300

[performance]
governor = "performance"
swappiness = 10
vfs_cache_pressure = 50
dirty_ratio = 10
dirty_background_ratio = 5
transparent_hugepages = "always"
smt_enabled = true
mitigations = "off"
nmi_watchdog = 0
kernel_lockdown = "integrity"

[security]
secure_boot = true
sandbox_enabled = true
audit_logging = true
permission_system = true
encrypted_memory = true
ai_approval_required = true
confirm_destructive = true

[boot]
timeout = 0
recovery_timeout = 5
default_entry = "prometheus"
animation = "prometheus-boot"
resolution = "native"
plymouth_theme = "prometheus"

[updates]
auto_update = false
update_channel = "stable"
snapshot_before_update = true
rollback_on_failure = true
