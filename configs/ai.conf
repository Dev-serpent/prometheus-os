[core]
model = "prometheus-base"
context_length = 8192
temperature = 0.7
top_p = 0.9
max_tokens = 2048
device = "auto"
precision = "fp16"

[memory]
engine = "graph"
embedding_dim = 768
similarity_threshold = 0.75
consolidation_interval = 3600
max_nodes = 1000000
prune_threshold = 0.1

[vision]
enabled = true
capture_rate = 2
ocr_enabled = true
screen_understanding = true
object_detection = false
face_detection = false
model = "prometheus-vision"

[voice]
enabled = true
wake_word = "prometheus"
stt_model = "whisper"
tts_model = "piper"
language = "en-US"
sensitivity = 0.5
vad_mode = "aggressive"

[automation]
enabled = true
learning_enabled = true
min_observations = 5
confidence_threshold = 0.7
max_automations = 100
require_approval = true

[plugins]
directory = "/usr/lib/prometheus/plugins"
auto_load = true
sandboxed = true
network_access = false

[agents]
max_agents = 8
max_agent_depth = 3
agent_timeout = 30000
collaborative = true
logging = true

[resource]
scale_on_battery = true
min_memory_mb = 256
max_memory_mb = 4096
cpu_cores = "50%"
gpu_memory_mb = 1024
