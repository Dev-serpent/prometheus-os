[display]
max_fps = 240
enable_vrr = true
enable_hdr = false
scale = 1.0
background_color = "#0A0A0A"
accent_color = "#0078FF"

[animations]
enable_animations = true
animation_speed = 1.0
physics_based = true
spring_stiffness = 300.0
spring_damping = 25.0
physics_fps = 240

[effects]
enable_blur = true
blur_size = 8
blur_passes = 3
enable_shadows = true
shadow_size = 12
shadow_opacity = 0.4
corner_radius = 12.0
enable_glow = true
glow_intensity = 0.3
glow_color = "#0078FF"

[input]
touchpad_natural_scroll = true
touchpad_tap_to_click = true
gesture_enabled = true
pointer_speed = 0.5
keyboard_repeat_rate = 30
keyboard_repeat_delay = 250

[workspaces]
count = 9
enable_animation = true
animation_curve = "spring"
wrap = true

[layout]
default_tiling = true
gap_size = 8
border_size = 2
master_factor = 0.6

[performance]
direct_scanout = true
tear_free = true
allow_tearing = false
idle_inhibit = true
power_save = true
adaptive_sync = true
buffer_age = 2
