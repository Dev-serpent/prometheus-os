site_name: Prometheus OS
site_description: AI-Native Operating System — Documentation for Developers, Contributors, and Users
site_author: Prometheus OS Team
site_url: https://dev-serpent.github.io/prometheus-os
repo_name: Dev-serpent/prometheus-os
repo_url: https://github.com/Dev-serpent/prometheus-os
edit_uri: blob/main/docs/
copyright: Copyright &copy; 2026 Prometheus OS Team

theme:
  name: material

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - announce.dismiss
    - blog.sidebar
    - blog.pagination

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dev-serpent/prometheus-os
    - icon: fontawesome/brands/discord
      link: https://discord.gg/prometheus-os
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/prometheus_os
  generator: false
  consent:
    title: Cookie Consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation.
  analytics:
    provider: google
    property: !ENV [GA_ID, ""]
  version:
    provider: mike
    default: latest

plugins:
  - search:
      lang: en
      separator: '[\s\-_]+'
  - awesome-pages:
      filename: .pages
      collapse_single_pages: true
      strict: false
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - macros
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      pagination_per_page: 10
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/extra.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
