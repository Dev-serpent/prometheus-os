# Prometheus OS RT Scheduling for Mutter
# Gives the compositor real-time priority for minimum latency

[org.gnome.mutter]
rt-scheduler=true
rt-scheduler-priority=99

[org.gnome.mutter.performance]
disable-software-compositing=true
disable-swap-inhibiting=false
triple-buffer-minimum-duration=2000
frame-pacing-max-jitter=4
sync-barrier-timeout=500
adaptive-sync-threshold=30
