      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#020208"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="45%" r="30%">
      <stop offset="0%" style="stop-color:rgba(0,120,255,0.04)"/>
      <stop offset="100%" style="stop-color:transparent"/>
