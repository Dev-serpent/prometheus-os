<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078FF"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
  </defs>
  <!-- P symbol -->
  <text x="100" y="140" font-family="monospace" font-size="160" font-weight="bold" fill="url(#accent)">P</text>
  <!-- Prometheus text -->
  <text x="200" y="120" font-family="monospace" font-size="64" font-weight="300" fill="#FFFFFF">PROMETHEUS</text>
  <text x="200" y="155" font-family="monospace" font-size="20" font-weight="300" fill="#A0A0A0" letter-spacing="4">OPERATING SYSTEM</text>
  <!-- Accent line -->
  <line x1="200" y1="168" x2="520" y2="168" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
</svg>
