<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Prometheus AI icon: stylized brain with circuit nodes -->
  <defs>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#brain)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain hemispheres -->
    <path d="M24 12c-5 0-9 2-11 6-2 3-2 7 0 10 1 2 3 3 5 4l1 4h10l1-4c2-1 4-2 5-4 2-3 2-7 0-10-2-4-6-6-11-6z"/>
    <!-- Neural nodes -->
    <circle cx="18" cy="20" r="2" fill="url(#brain)"/>
    <circle cx="30" cy="20" r="2" fill="url(#brain)"/>
    <circle cx="24" cy="16" r="1.5" fill="url(#brain)"/>
    <circle cx="15" cy="28" r="1.5" fill="url(#brain)"/>
    <circle cx="33" cy="28" r="1.5" fill="url(#brain)"/>
    <!-- Connections -->
    <line x1="20" y1="20" x2="22" y2="17"/>
    <line x1="28" y1="20" x2="26" y2="17"/>
    <line x1="24" y1="18" x2="24" y2="22"/>
    <line x1="18" y1="22" x2="16" y2="27"/>
    <line x1="30" y1="22" x2="32" y2="27"/>
    <!-- Pulse dots -->
    <circle cx="24" cy="36" r="1" fill="#00C853">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
